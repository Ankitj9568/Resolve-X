name: CI
on:
  pull_request:
    branches: [main, dev]
jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v3
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Run ESLint
        run: npm run lint
      - name: Type check
        run: npm run type-check
      - name: Run migrations
        run: npm run migrate
      - name: Run unit tests
        run: npm test
      - name: Build
        run: npm run build
